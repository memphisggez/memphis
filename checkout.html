<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memphis - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root{
            --bg-url: url('BG 1.gif'); 
            --main:#333333;
            --dark:#1a1a1a;
            --white:#FFFFFF;
            --accent:#666666;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}

        body{
            background-image: var(--bg-url);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            display:flex;
            justify-content:center;
            align-items: center;
            min-height: 100vh; 
            color: var(--dark);
        }

        .checkout-container {
            background: var(--white);
            max-width: 450px;
            width: 90%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid var(--main);
            margin: 20px 0;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; }
        
        .order-summary {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .order-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #eee;
        }

        .order-details {
            flex: 1;
        }

        .order-label {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 2px;
        }

        .order-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .order-price {
            font-weight: 500;
            color: var(--danger);
            font-size: 15px;
        }

        .qr-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .qr-section img {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            border: 2px dashed #ccc;
            margin: 10px 0;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 5px; font-size: 14px;}
        
        /* 🛠️ แก้ไขสไตล์ให้รองรับ input[type="email"] เพิ่มเข้ามา */
        .form-group input[type="text"], .form-group input[type="email"], .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Mitr', sans-serif;
        }

        .status-box {
            display: none; 
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 500;
            line-height: 1.5;
        }
        .status-error { background: #fadbd8; color: var(--danger); display: block; }
        .status-success { background: #d5f5e3; color: var(--success); display: block; }

        /* ปุ่มลิงก์สำหรับกดเข้ากลุ่มไลน์ตอนทำรายการเสร็จ */
        .line-group-btn {
            display: inline-block;
            background: #06C755;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: 0.3s;
        }
        .line-group-btn:hover {
            background: #05b34c;
        }

        .btn-submit {
            width: 100%;
            background: var(--main);
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-submit:not(:disabled):hover { background: var(--dark); }

        #qr-canvas { display: none; } 
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="header">
            <h1>ชำระเงิน / แจ้งโอน</h1>
            <p style="font-size: 14px; color: var(--accent);">อัปโหลดสลิปเพื่อรับสิทธิ์เข้ากลุ่มอัตโนมัติ</p>
        </div>

        <div class="order-summary">
            <img id="itemImg" class="order-img" src="ผมม้าปิดตา.JPG" alt="รูปกลุ่ม" onerror="this.src='ผมม้าปิดตา.JPG'">
            <div class="order-details">
                <div class="order-label">รายการสั่งซื้อ:</div>
                <div id="itemName" class="order-name">กำลังโหลดข้อมูล...</div>
                <div id="itemPrice" class="order-price">- บาท</div>
            </div>
        </div>

        <div class="qr-section">
            <p>สแกน QR Code เพื่อชำระเงิน</p>
            <img src="YOUR_PROMPTPAY_QR.png" alt="QR Code รับเงิน">
            <p><strong>Kbank : 213-8-03713-7</strong></p>
            <p><strong>SCB : 579-2-78259-4</strong></p>
            <p><strong>True wallet : 0988863400</strong></p>
