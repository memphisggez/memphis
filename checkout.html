<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memphis - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root{
            --bg-url: url('BG 1.gif'); 
            --main:#333333;
            --dark:#1a1a1a;
            --white:#FFFFFF;
            --accent:#666666;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        *{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}

        body{
            background-image: var(--bg-url);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            display:flex;
            justify-content:center;
            align-items: center;
            min-height: 100vh; 
            color: var(--dark);
        }

        .checkout-container {
            background: var(--white);
            max-width: 450px;
            width: 90%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid var(--main);
            margin: 20px 0;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; }
        
        .order-summary {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .order-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #eee;
        }

        .order-details {
            flex: 1;
        }

        .order-label {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 2px;
        }

        .order-name {
            font-weight: 500;
            font-size: 16px;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .order-price {
            font-weight: 500;
            color: var(--danger);
            font-size: 15px;
        }

        .qr-section {
            text-align: center;
            margin-bottom: 25px;
        }
        .qr-section img {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            border: 2px dashed #ccc;
            margin: 10px 0;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 5px; font-size: 14px;}
        
        /* 🛠️ แก้ไขสไตล์ให้รองรับ input[type="email"] เพิ่มเข้ามา */
        .form-group input[type="text"], .form-group input[type="email"], .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Mitr', sans-serif;
        }

        .status-box {
            display: none; 
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 500;
            line-height: 1.5;
        }
        .status-error { background: #fadbd8; color: var(--danger); display: block; }
        .status-success { background: #d5f5e3; color: var(--success); display: block; }

        /* ปุ่มลิงก์สำหรับกดเข้ากลุ่มไลน์ตอนทำรายการเสร็จ */
        .line-group-btn {
            display: inline-block;
            background: #06C755;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: 0.3s;
        }
        .line-group-btn:hover {
            background: #05b34c;
        }

        .btn-submit {
            width: 100%;
            background: var(--main);
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-submit:not(:disabled):hover { background: var(--dark); }

        #qr-canvas { display: none; } 
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="header">
            <h1>ชำระเงิน / แจ้งโอน</h1>
            <p style="font-size: 14px; color: var(--accent);">อัปโหลดสลิปเพื่อรับสิทธิ์เข้ากลุ่มอัตโนมัติ</p>
        </div>

        <div class="order-summary">
            <img id="itemImg" class="order-img" src="ผมม้าปิดตา.JPG" alt="รูปกลุ่ม" onerror="this.src='ผมม้าปิดตา.JPG'">
            <div class="order-details">
                <div class="order-label">รายการสั่งซื้อ:</div>
                <div id="itemName" class="order-name">กำลังโหลดข้อมูล...</div>
                <div id="itemPrice" class="order-price">- บาท</div>
            </div>
        </div>

        <div class="qr-section">
            <p>สแกน QR Code เพื่อชำระเงิน</p>
            <img src="YOUR_PROMPTPAY_QR.png" alt="QR Code รับเงิน">
            <p><strong>Kbank : 213-8-03713-7</strong></p>
            <p><strong>SCB : 579-2-78259-4</strong></p>
            <p><strong>True wallet : 0988863400</strong></p>
            <p style="font-size: 12px; color: var(--accent);">ชื่อบัญชี : Kanokwan Ph.</p>
        </div>

        <form id="checkoutForm">
            <div class="form-group">
                <label for="userEmail">Gmail ของคุณ (สำคัญมาก! สำหรับรับสิทธิ์เข้า Drive)</label>
                <input type="email" id="userEmail" placeholder="พิมพ์ @gmail.com ของคุณให้ถูกต้อง" required>
            </div>

            <div class="form-group">
                <label for="lineId">Line ID ของคุณ (เพื่อใช้ติดต่อกรณีมีปัญหา)</label>
                <input type="text" id="lineId" placeholder="พิมพ์ไอดีไลน์ของคุณ" required>
            </div>

            <div class="form-group">
                <label for="slipInput">อัปโหลดภาพสลิปโอนเงิน (ต้องมี QR Code)</label>
                <input type="file" id="slipInput" accept="image/jpeg, image/png, image/jpg" required>
            </div>

            <div id="statusBox" class="status-box">กำลังรอสลิป...</div>

            <button type="submit" id="submitBtn" class="btn-submit" disabled>
                🔒 กรุณาอัปโหลดสลิปที่ถูกต้อง
            </button>
        </form>

        <canvas id="qr-canvas"></canvas>
    </div>

    <script>
        // 1. ดึงข้อมูลจาก URL มาแสดงผล
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const groupName = urlParams.get('group');
            const price = urlParams.get('price');

            if(groupName) {
                document.getElementById('itemName').innerText = groupName;
                document.getElementById('itemPrice').innerText = (price ? price : '99') + ' บาท';
                document.getElementById('itemImg').src = groupName + '.jpg';
            } else {
                document.getElementById('itemName').innerText = 'ไม่ได้ระบุกลุ่ม (โปรดกลับไปเลือกใหม่)';
            }
        });

        // 2. ระบบสแกนเช็ค QR Code ด่านหน้า
        const slipInput = document.getElementById('slipInput');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        slipInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusBox.className = 'status-box';
            statusBox.style.display = 'block';
            statusBox.innerHTML = '⏳ กำลังตรวจสอบรูปภาพ...';
            submitBtn.disabled = true;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, img.width, img.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    if (code) {
                        statusBox.className = 'status-box status-success';
                        statusBox.innerHTML = '✅ ตรวจพบ QR Code บนสลิปเรียบร้อย!';
                        submitBtn.innerHTML = 'ส่งข้อมูลแจ้งโอนเงินอัตโนมัติ';
                        submitBtn.disabled = false;
                    } else {
                        statusBox.className = 'status-box status-error';
                        statusBox.innerHTML = '❌ ไม่พบ QR Code กรุณาแนบรูปสลิปของจริง';
                        submitBtn.innerHTML = '🔒 กรุณาอัปโหลดสลิปที่ถูกต้อง';
                        slipInput.value = ''; 
                    }
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // 3. ระบบส่งข้อมูลไปยัง Google Apps Script
        document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const API_URL = 'https://script.google.com/macros/s/AKfycbxgSGoHLfXDhf6eVst7zQKBx_k0YK-VzEuoxPdVfkXCLN6XUchZVW9ZPiYeIZ7RpCA/exec';

            const submitBtn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            const fileInput = document.getElementById('slipInput');
            
            // 🛠️ ดึงค่า Gmail และข้อมูลฟอร์ม
            const userEmail = document.getElementById('userEmail').value;
            const lineId = document.getElementById('lineId').value;
            const groupName = document.getElementById('itemName').innerText;
            
            // 🛠️ สกัดเอาเฉพาะตัวเลขราคา (ตัดคำว่า " บาท" ทิ้งเพื่อให้หลังบ้านใช้ตัวเลขเช็คกับ SlipOK ได้แม่นยำ)
            const rawPrice = document.getElementById('itemPrice').innerText;
            const price = rawPrice.replace(/[^0-9.]/g, '');

            if (!fileInput.files.length) {
                alert('กรุณาเลือกไฟล์สลิปก่อนครับ');
                return;
            }

            const file = fileInput.files[0];

            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ กำลังตรวจสอบสลิปผ่านระบบธนาคาร...';
            statusBox.className = 'status-box';
            statusBox.innerHTML = 'ระบบกำลังส่งสลิปของคุณไปตรวจสอบความถูกต้องกับธนาคาร โปรดห้ามปิดหน้านี้...';

            const reader = new FileReader();
            reader.onload = async function(event) {
                const base64String = event.target.result.split(',')[1];

                // 🛠️ ส่ง email เพิ่มเข้าไปในก้อน Payload
                const payload = {
                    email: userEmail,
                    lineId: lineId,
                    groupName: groupName,
                    price: price,
                    slipName: file.name,
                    mimeType: file.type,
                    slipBase64: base64String
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (result.status === 'success') {
                        // 🛠️ แจ้งโอนสำเร็จและส่งมอบลิงก์กลุ่มไลน์ให้กดเข้ากลุ่มต่อ
                        statusBox.className = 'status-box status-success';
                        statusBox.innerHTML = `🎉 อนุมัติสำเร็จ! ระบบดึง Gmail เข้าดูโฟลเดอร์เรียบร้อยแล้ว<br>
                                               <small style="color:#666;">โปรดตรวจสอบสิทธิ์ที่แอป Google Drive</small><br><br>
                                               <strong>👇 กดปุ่มด้านล่างเพื่อเข้ากลุ่ม LINE รับข่าวสาร 👇</strong><br>
                                               <a href="https://line.me/ti/g/ใส่ลิงก์กลุ่มไลน์ของคิลตรงนี้" target="_blank" class="line-group-btn">🟢 เข้าร่วมกลุ่ม LINE</a>`;
                        submitBtn.innerHTML = '✅ ตรวจสอบและดึงเข้ากลุ่มสำเร็จ';
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    statusBox.className = 'status-box status-error';
                    statusBox.innerHTML = '❌ Error: ' + error.message + '<br><br><small>หากมั่นใจว่าโอนเงินถูกต้อง กรุณาทักแชท Facebook เพื่อแจ้งแอดมินให้แก้ไขสิทธิ์ให้โดยตรงครับ</small>';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'ลองส่งข้อมูลอีกครั้ง';
                    console.error('Error:', error);
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
