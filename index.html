<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memphis - Official Store</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* เพิ่ม smooth scroll เพื่อให้เวลาคลิกแล้วเลื่อนลงแบบนุ่มนวล */
html {
  scroll-behavior: smooth;
}

:root{
--bg-url: url('BG 1.gif'); 
--main:#333333;
--dark:#1a1a1a;
--white:#FFFFFF;
--glow:rgba(0,0,0,0.1);
--accent:#666666;
--stroke-color: #f3f5f4; 
--mint-accent: #DCEEF0; /* สีเรืองแสงของหัวใจ */
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}

body{
background-image: var(--bg-url);
background-attachment: fixed;
background-size: cover;
background-position: center;
display:flex;
justify-content:center;
min-height: 100vh; 
}

/* --- ส่วนที่เพิ่ม Outline Stroke --- */
.hero-title {
  color: var(--dark);
  -webkit-text-stroke: 1.5px var(--stroke-color);
  paint-order: stroke fill;
  font-size: 2.5rem;
}

.hero-subtitle {
  color: var(--dark);
  font-weight: 500;
  -webkit-text-stroke: 0.8px var(--stroke-color);
  paint-order: stroke fill;
}

/* --- CSS สำหรับกล่องเมนูแบบกระชับ (Compact) --- */
.compact-section {
    padding: 15px 20px; 
}
.compact-section h2 {
    font-size: 1.1rem;
    margin-bottom: 12px;
}
.compact-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f9f9f9;
    padding: 8px 15px; 
    margin-bottom: 6px; 
    border-radius: 10px;
    border-left: 4px solid var(--accent);
    text-decoration: none;
    color: var(--dark);
    font-size: 14px;
    font-weight: 500;
    transition: 0.2s;
}
.compact-link:hover {
    background: #f0f0f0;
    border-left-color: var(--dark);
    transform: translateX(4px); 
}
.compact-link .arrow {
    color: var(--accent);
    font-weight: bold;
}
.btn-compact {
    display: block;
    text-align: center;
    background: var(--main);
    color: #fff;
    padding: 10px; 
    border-radius: 12px; 
    text-decoration: none;
    margin-top: 10px;
    font-size: 14px;
    font-weight: 500;
    transition: 0.3s;
}
.btn-compact:hover {
    background: var(--dark);
    transform: scale(1.02);
}

/* --- CSS สำหรับ Layout 2 ฝั่ง --- */
.layout-wrapper {
  width: 100%;
  max-width: 500px; 
  padding: 20px 15px 40px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
}

.section{
background:var(--white);
border-radius:20px;
padding:25px 20px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
border:2px solid var(--main);
}

h1,h2,h3{color:var(--dark);}
.center{text-align:center;}

.logo{
width:120px;height:120px; 
border-radius:50%;
overflow:hidden;
margin:0 auto 20px;
box-shadow:0 6px 20px var(--glow);
background:#eee;
}

.logo img{width:100%;height:100%;object-fit:cover;}

.badges{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.badge{
background:#fff;
padding:8px 16px;
border-radius:25px;
box-shadow:0 4px 10px var(--glow);
font-size:13px;
color:var(--dark);
border: 1px solid #eee;
}

.btn-outline{
background:#fff;
border:2px dashed var(--main);
color:var(--dark);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 8px;
overflow: hidden;
height: auto;
padding: 15px;
margin-bottom: 20px;
}

.btn-outline img {
width: 100%;
max-width: 400px;
height: auto;
border-radius: 10px;
}

.btn-main{
background:var(--main);
color:#fff;
display:block;
text-align:center;
padding:14px;
border-radius:25px;
text-decoration:none;
margin-top:15px;
font-weight:500;
transition: 0.3s;
}

.step{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.step-num{
background:var(--main);
color:#fff;
width:26px;height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
flex-shrink: 0;
}

.portfolio-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 15px;
margin-top: 15px;
}

/* --- โค้ดตกแต่งการ์ดผลงาน --- */
.portfolio-card {
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 15px;
    padding: 10px;
    text-align: center;
    display: flex;
    flex-direction: column;
    height: 100%; 
    transition: 0.3s;
}

.card-content-link {
    text-decoration: none;
    color: inherit;
    display: block;
}
