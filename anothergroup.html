<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memphis - Official Store</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f4f4f4;
--main:#333333;
--dark:#1a1a1a;
--white:#FFFFFF;
--glow:rgba(0,0,0,0.1);
--accent:#666666;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Mitr',sans-serif;}

body{
background:var(--bg);
display:flex;
justify-content:center;
}

.container{
max-width:500px;
width:100%;
padding:20px 15px 40px;
}

.section{
background:var(--white);
border-radius:20px;
padding:25px 20px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
border:2px solid var(--main);
}

h1,h2,h3{color:var(--dark);}
.center{text-align:center;}
